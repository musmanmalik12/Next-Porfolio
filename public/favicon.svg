<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="prompt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="35%" stop-color="#34d399"/>
      <stop offset="65%" stop-color="#fbbf24"/>
      <stop offset="85%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" fill="#060b18"/>
  
  <!-- Terminal prompt > with colorful gradient and glow -->
  <text 
    x="32" 
    y="48" 
    font-family="'Courier New', monospace" 
    font-size="52" 
    font-weight="900" 
    fill="url(#prompt-grad)" 
    text-anchor="middle"
    filter="url(#glow)"
    opacity="0.95"
  >
    &gt;
  </text>
</svg>